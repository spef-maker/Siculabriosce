<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prospetto Turni Mensile</title>
<style>
  :root{
    --ink:#1f2421;
    --paper:#f8f6f2;
    --white:#ffffff;
    --accent:#b5563c;
    --ok:#3a7a3a;
    --warn:#b5563c;
    --muted:#888;
    --line:#e0dbd4;
    --line-strong:#c8c2ba;
    --riposo:#cfc9bd;
    --riposo-strong:#7a7268;
    --ferie:#e8c89a;
    --ferie-strong:#8a6020;
    --font-sans:'Helvetica Neue',Arial,sans-serif;
    --font-mono:'Courier New',monospace;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:var(--font-sans);background:var(--paper);color:var(--ink);font-size:13px;line-height:1.4;}
  .app{max-width:100%;padding:16px;}

  /* TOOLBAR */
  .toolbar{display:flex;align-items:center;gap:8px;flex-wrap:wrap;padding:10px 0 14px;border-bottom:2px solid var(--ink);margin-bottom:16px;}
  .toolbar h1{font-size:18px;font-weight:800;letter-spacing:-.5px;margin-right:8px;}
  .toolbar .sub{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.8px;margin-right:16px;}
  .month-nav{display:flex;align-items:center;gap:6px;}
  .month-nav label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;}
  .month-nav input[type="date"]{font-family:var(--font-mono);font-size:12px;border:1px solid var(--line-strong);border-radius:3px;padding:3px 6px;background:var(--white);}
  .month-nav .days-count{font-family:var(--font-mono);font-size:11px;color:var(--muted);padding:0 4px;}
  .toolbar button{font-family:var(--font-sans);font-size:12px;border:1px solid var(--line-strong);border-radius:3px;padding:5px 10px;background:var(--white);cursor:pointer;color:var(--ink);}
  .toolbar button:hover{background:var(--ink);color:var(--white);}
  .toolbar button.primary{background:var(--ink);color:var(--white);border-color:var(--ink);}
  .toolbar button.primary:hover{background:var(--accent);border-color:var(--accent);}
  .toolbar .file-label{font-family:var(--font-sans);font-size:12px;border:1px solid var(--line-strong);border-radius:3px;padding:5px 10px;background:var(--white);cursor:pointer;color:var(--ink);}
  .toolbar .file-label:hover{background:var(--ink);color:var(--white);}
  .toolbar .sync-status{font-size:11px;color:var(--ok);margin-left:auto;}

  /* LEGEND */
  .legend{display:flex;gap:14px;align-items:center;margin-bottom:12px;font-size:11px;color:var(--muted);}
  .legend .swatch{display:inline-block;width:14px;height:14px;border-radius:2px;margin-right:4px;vertical-align:middle;}
  .legend .swatch.riposo{background:var(--riposo);}
  .legend .swatch.ferie{background:var(--ferie);}

  /* DEPT BLOCK */
  .dept-block{margin-bottom:24px;border:1px solid var(--line);border-radius:4px;overflow:hidden;}
  .dept-header{display:flex;align-items:center;gap:8px;padding:8px 12px;background:var(--ink);color:var(--white);}
  .dept-header input.dept-name{font-family:var(--font-sans);font-size:15px;font-weight:700;color:var(--white);background:transparent;border:none;outline:none;flex:1;}
  .dept-header button{font-size:11px;border:1px solid rgba(255,255,255,.4);border-radius:3px;padding:3px 8px;background:transparent;color:var(--white);cursor:pointer;}
  .dept-header button:hover{background:var(--accent);border-color:var(--accent);}

  /* DEPT SETTINGS */
  .dept-settings{background:#f0ede8;padding:8px 12px;display:flex;flex-wrap:wrap;gap:10px;align-items:center;border-bottom:1px solid var(--line);}
  .dept-settings label{font-size:11px;color:var(--ink);display:flex;align-items:center;gap:4px;}
  .dept-settings input[type="number"]{width:48px;font-size:11px;border:1px solid var(--line-strong);border-radius:3px;padding:2px 4px;}
  .dept-settings .checkbox-label{font-size:11px;color:var(--ink);display:flex;align-items:center;gap:4px;cursor:pointer;}
  .dept-settings .checkbox-label input[type="checkbox"]{margin:0;}
  .dept-settings .mode-hint{font-size:10px;color:var(--muted);font-style:italic;}
  .dept-settings button.generate{font-size:11px;border:1px solid var(--ink);border-radius:3px;padding:4px 10px;background:var(--ink);color:var(--white);cursor:pointer;margin-left:auto;}
  .dept-settings button.generate:hover{background:var(--accent);border-color:var(--accent);}

  /* COVERAGE REPORT */
  .coverage-report{padding:6px 12px;font-size:11px;background:#fafaf8;}
  .coverage-report .ok-msg{color:var(--ok);font-weight:600;}
  .coverage-report .warn-msg{color:var(--warn);font-weight:600;}
  .coverage-report ul{margin:4px 0 4px 16px;}
  .coverage-report li{margin-bottom:2px;}

  /* ROSTER TABLE */
  .grid-wrap{overflow-x:auto;}
  table.roster{border-collapse:collapse;font-size:12px;width:max-content;}
  table.roster th,table.roster td{border:1px solid var(--line);text-align:center;padding:0;}
  table.roster th{background:#f0ede8;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.3px;padding:3px 4px;white-space:nowrap;}
  th.daynum{min-width:28px;font-size:9px;line-height:1.2;}
  th.weekend,td.weekend{background:#ede8de;}

  /* NAME CELL */
  .name-cell{min-width:160px;max-width:200px;text-align:left!important;padding:2px 6px!important;position:sticky;left:0;z-index:2;background:var(--white);}
  .name-cell input.emp-name{font-family:var(--font-sans);font-size:12px;border:none;outline:none;background:transparent;width:calc(100% - 20px);padding:1px 0;}
  .name-cell input.emp-name:focus{outline:2px solid var(--accent);outline-offset:-2px;}
  .name-cell input.emp-name{padding-right:24px;}
  .name-cell .del-row{position:absolute;right:4px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--muted);font-size:14px;line-height:1;padding:2px;}
  .name-cell .del-row:hover{color:var(--accent);}

  /* ROLE COLORS */
  tr[data-role="responsabile"] .name-cell{background:#fbe9d8;border-left:3px solid #c4791f;}
  tr[data-role="responsabile"] input.emp-name{color:#8a4f0f;font-weight:700;}
  tr[data-role="vice"] .name-cell{background:#e3edf7;border-left:3px solid #3d6fa3;}
  tr[data-role="vice"] input.emp-name{color:#234d73;font-weight:700;}
  tr[data-role="pasticcere"] .name-cell{background:#e6f4e6;border-left:3px solid #3a8a3a;}
  tr[data-role="pasticcere"] input.emp-name{color:#1f5c1f;font-weight:700;}
  tr[data-role="consegne_pomeriggio"] .name-cell{background:#f0e6f6;border-left:3px solid #7c3fa0;}
  tr[data-role="consegne_pomeriggio"] input.emp-name{color:#52217a;font-weight:700;}
  tr[data-role="forni"] .name-cell{background:#fde8e8;border-left:3px solid #b03030;}
  tr[data-role="forni"] input.emp-name{color:#7a1a1a;font-weight:700;}
  tr[data-role="forni_bis"] .name-cell{background:#fdf0e8;border-left:3px solid #c47a3a;}
  tr[data-role="forni_bis"] input.emp-name{color:#8a4a10;font-weight:700;}

  /* SELECT RUOLO */
  select.emp-role{font-family:var(--font-mono);font-size:9px;text-transform:uppercase;letter-spacing:.5px;border:1px solid var(--line-strong);border-radius:3px;padding:2px 4px;background:var(--white);color:var(--muted);cursor:pointer;}
  tr[data-role="responsabile"] select.emp-role{border-color:#c4791f;color:#8a4f0f;}
  tr[data-role="vice"] select.emp-role{border-color:#3d6fa3;color:#234d73;}
  tr[data-role="pasticcere"] select.emp-role{border-color:#3a8a3a;color:#1f5c1f;}
  tr[data-role="consegne_pomeriggio"] select.emp-role{border-color:#7c3fa0;color:#52217a;}
  tr[data-role="forni"] select.emp-role{border-color:#b03030;color:#7a1a1a;}
  tr[data-role="forni_bis"] select.emp-role{border-color:#c47a3a;color:#8a4a10;}

  /* EMP DATES */
  .emp-dates{display:flex;flex-wrap:wrap;gap:4px;align-items:center;margin-top:2px;}
  .emp-dates label{font-size:9px;color:var(--muted);display:flex;align-items:center;gap:2px;}
  .emp-dates input[type="date"]{font-size:9px;border:1px solid var(--line);border-radius:2px;padding:1px 3px;width:100px;}

  /* DAY CELLS */
  td.daycell{width:28px;min-width:28px;height:22px;cursor:pointer;position:relative;}
  td.daycell:hover{box-shadow:inset 0 0 0 2px var(--accent);}
  td.daycell.inactive{background:#f0ede8;cursor:default;}
  td.daycell.inactive:hover{box-shadow:none;}

  /* RIPOSI COLORATI PER GIORNO */
  td.daycell.riposo{background:var(--riposo);}
  td.daycell.riposo.dow-1{background:#a8c8e8;}
  td.daycell.riposo.dow-2{background:#a8d8a8;}
  td.daycell.riposo.dow-3{background:#e8d888;}
  td.daycell.riposo.dow-4{background:#e8a8c8;}
  td.daycell.riposo.dow-5{background:#a8e0d8;}
  td.daycell.riposo.dow-6{background:#c8a8e8;}
  td.daycell.riposo.dow-0{background:#e8c8a8;}
  td.daycell.riposo::after{content:'R';font-family:var(--font-mono);font-size:10px;color:var(--riposo-strong);font-weight:700;}
  td.daycell.riposo.dow-1::after{color:#2a5a80;}
  td.daycell.riposo.dow-2::after{color:#2a6a2a;}
  td.daycell.riposo.dow-3::after{color:#806820;}
  td.daycell.riposo.dow-4::after{color:#80286a;}
  td.daycell.riposo.dow-5::after{color:#206860;}
  td.daycell.riposo.dow-6::after{color:#502880;}
  td.daycell.riposo.dow-0::after{color:#804828;}
  td.daycell.ferie{background:var(--ferie);}
  td.daycell.ferie::after{content:'F';font-family:var(--font-mono);font-size:10px;color:var(--ferie-strong);font-weight:700;}

  /* ADD DEPT */
  .add-dept-wrap{margin-top:16px;}

  footer.foot{margin-top:24px;padding-top:10px;border-top:1px solid var(--line);font-size:10px;color:var(--muted);text-align:center;text-transform:uppercase;letter-spacing:.5px;}

  /* PRINT */
  @page{size:A3 landscape;margin:6mm 4mm;}
  @media print{
    html,body{width:100%;height:auto;background:var(--white);font-size:8px;-webkit-print-color-adjust:exact;print-color-adjust:exact;}
    .app{max-width:none;width:100%;padding:4px;}
    .toolbar,.legend,footer.foot,.add-dept-wrap,.name-cell .del-row,.dept-header button,.dept-settings button.generate,.coverage-report,select.emp-role,.emp-dates,input[type="date"],.month-nav input[type="date"]{display:none!important;}
    .month-nav{margin-bottom:4px;}
    .dept-block{page-break-inside:avoid;break-inside:avoid;border:2px solid #333;margin-bottom:8px;}
    .dept-header{background:#eee!important;color:var(--ink)!important;padding:3px 6px;border-bottom:2px solid #333!important;}
    .dept-header input.dept-name{color:var(--ink)!important;font-weight:700;font-size:10px;}
    .dept-settings{display:none!important;}
    .grid-wrap{overflow:visible!important;width:100%;}

    /* Griglia principale: bordi netti e leggibili */
    table.roster{font-size:7px;width:100%;table-layout:auto;border-collapse:collapse;border:2.5px solid #111!important;}
    table.roster th,table.roster td{
      padding:1px 2px;min-width:0;
      border:1px solid #999!important;
    }
    /* Bordo più spesso tra ogni riga (separatore orizzontale robusto) */
    table.roster tbody tr{border-top:2px solid #222!important;border-bottom:2px solid #222!important;}
    table.roster tbody tr td,
    table.roster tbody tr th{
      border-top:2px solid #222!important;
      border-bottom:2px solid #222!important;
    }
    /* Bordo ancora più spesso ogni sabato (separatore settimanale) */
    table.roster th.dow-6, table.roster td.dow-6{border-right:2.5px solid #111!important;}
    /* Intestazione colonne ben marcata */
    table.roster thead tr{border-bottom:3px solid #111!important;}
    table.roster thead th{
      border:1px solid #666!important;
      border-bottom:3px solid #111!important;
      background:#ccc!important;
      font-weight:800;
      font-size:7px;
      -webkit-print-color-adjust:exact;
      print-color-adjust:exact;
    }
    /* Colonna nomi: bordo destro spesso per separare i nomi dalle celle */
    .name-cell{
      min-width:110px!important;max-width:150px!important;
      font-size:16px;font-weight:700;word-break:break-word;position:static!important;
      border-right:3px solid #111!important;
      border-top:2px solid #222!important;
      border-bottom:2px solid #222!important;
    }
    .name-cell input.emp-name{font-size:16px;font-weight:700;padding:0;border:none;background:transparent;width:100%;}
    th.daynum{font-size:6px;padding:1px;}

    /* Altezza righe uniforme 4x su tutte le celle della riga */
    table.roster tbody tr td,
    table.roster tbody tr th{
      height:28px!important;
      line-height:28px!important;
      padding:0 2px!important;
      vertical-align:middle!important;
    }
    table.roster tbody tr:nth-child(odd) .name-cell,
    table.roster tbody tr:nth-child(odd) td.daycell:not(.riposo):not(.ferie):not(.inactive){
      background-color:#f0f0f0!important;
      -webkit-print-color-adjust:exact;print-color-adjust:exact;
    }
    table.roster tbody tr:nth-child(even) .name-cell,
    table.roster tbody tr:nth-child(even) td.daycell:not(.riposo):not(.ferie):not(.inactive){
      background-color:#e0e0e0!important;
      -webkit-print-color-adjust:exact;print-color-adjust:exact;
    }
    /* I colori ruolo sulla cella nome sovrascrivono l'alternanza */
    tr[data-role="responsabile"] .name-cell{background:#fbe9d8!important;-webkit-print-color-adjust:exact;print-color-adjust:exact;}
    tr[data-role="vice"] .name-cell{background:#e3edf7!important;-webkit-print-color-adjust:exact;print-color-adjust:exact;}
    tr[data-role="pasticcere"] .name-cell{background:#e6f4e6!important;-webkit-print-color-adjust:exact;print-color-adjust:exact;}
    tr[data-role="consegne_pomeriggio"] .name-cell{background:#f0e6f6!important;-webkit-print-color-adjust:exact;print-color-adjust:exact;}
    tr[data-role="forni"] .name-cell{background:#fde8e8!important;-webkit-print-color-adjust:exact;print-color-adjust:exact;}
    tr[data-role="forni_bis"] .name-cell{background:#fdf0e8!important;-webkit-print-color-adjust:exact;print-color-adjust:exact;}
    /* Colori celle */
    td.daycell.riposo{background:#cfc9bd!important;-webkit-print-color-adjust:exact;print-color-adjust:exact;}
    td.daycell.riposo.dow-1{background:#a8c8e8!important;-webkit-print-color-adjust:exact;print-color-adjust:exact;}
    td.daycell.riposo.dow-2{background:#a8d8a8!important;-webkit-print-color-adjust:exact;print-color-adjust:exact;}
    td.daycell.riposo.dow-3{background:#e8d888!important;-webkit-print-color-adjust:exact;print-color-adjust:exact;}
    td.daycell.riposo.dow-4{background:#e8a8c8!important;-webkit-print-color-adjust:exact;print-color-adjust:exact;}
    td.daycell.riposo.dow-5{background:#a8e0d8!important;-webkit-print-color-adjust:exact;print-color-adjust:exact;}
    td.daycell.riposo.dow-6{background:#c8a8e8!important;-webkit-print-color-adjust:exact;print-color-adjust:exact;}
    td.daycell.riposo.dow-0{background:#e8c8a8!important;-webkit-print-color-adjust:exact;print-color-adjust:exact;}
    td.daycell.ferie{background:#f0e0cc!important;-webkit-print-color-adjust:exact;print-color-adjust:exact;}
    td.daycell.inactive{background:#f0f0f0!important;-webkit-print-color-adjust:exact;print-color-adjust:exact;}
    th.weekend,td.weekend{background:#f0f0f0!important;-webkit-print-color-adjust:exact;print-color-adjust:exact;}
    tr[data-role="responsabile"] .name-cell{background:#fbe9d8!important;-webkit-print-color-adjust:exact;print-color-adjust:exact;}
    tr[data-role="vice"] .name-cell{background:#e3edf7!important;-webkit-print-color-adjust:exact;print-color-adjust:exact;}
    tr[data-role="pasticcere"] .name-cell{background:#e6f4e6!important;-webkit-print-color-adjust:exact;print-color-adjust:exact;}
    tr[data-role="consegne_pomeriggio"] .name-cell{background:#f0e6f6!important;-webkit-print-color-adjust:exact;print-color-adjust:exact;}
    tr[data-role="forni"] .name-cell{background:#fde8e8!important;-webkit-print-color-adjust:exact;print-color-adjust:exact;}
    tr[data-role="forni_bis"] .name-cell{background:#fdf0e8!important;-webkit-print-color-adjust:exact;print-color-adjust:exact;}
  }
</style>
</head>
<body>
<div class="app">
  <div class="toolbar">
    <h1>Prospetto Turni Mensile</h1>
    <span class="sub">Reparti · Personale · Giorni di Riposo</span>
    <div class="month-nav">
      <label>Dal</label>
      <input type="date" id="periodStart">
      <label>Al</label>
      <input type="date" id="periodEnd">
      <span class="days-count" id="daysCount"></span>
    </div>
    <button id="shareBtn">🔗 Condividi link</button>
    <button id="exportPdfBtn">Esporta PDF</button>
    <button id="exportJsonBtn">Esporta dati (JSON)</button>
    <label class="file-label">Importa dati (JSON)<input type="file" id="importJsonInput" accept=".json" style="display:none"></label>
    <button class="primary" id="addDeptBtn">+ Nuovo reparto</button>
    <span class="sync-status" id="syncStatus"></span>
  </div>
  <div class="legend">
    <span><span class="swatch riposo"></span>Riposo</span>
    <span><span class="swatch ferie" style="background:#e8c89a;display:inline-block;width:14px;height:14px;border-radius:2px;margin-right:4px;vertical-align:middle;"></span>Ferie</span>
    <span style="font-size:10px;color:var(--muted);">Clicca su una cella: Lavora → Riposo → Ferie → Lavora</span>
  </div>
  <div id="deptContainer"></div>
  <div class="add-dept-wrap"></div>
  <footer class="foot">I dati sono mantenuti nella sessione del browser corrente — Esporta per conservarli o condividerli</footer>
</div>
<script>
  // ---------- Utils ----------
  function uid(){ return Date.now().toString(36)+Math.random().toString(36).slice(2,7); }
  function parseDateStr(s){ const [y,m,d]=s.split('-').map(Number); return new Date(y,m-1,d); }
  function dateToStr(d){ const mm=String(d.getMonth()+1).padStart(2,'0'),dd=String(d.getDate()).padStart(2,'0'); return d.getFullYear()+'-'+mm+'-'+dd; }
  function escapeHtml(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
  function formatDateShort(dateStr){
    const d=parseDateStr(dateStr);
    const dn=['Dom','Lun','Mar','Mer','Gio','Ven','Sab'];
    return dn[d.getDay()]+' '+d.getDate()+'/'+String(d.getMonth()+1).padStart(2,'0');
  }

  // ---------- Data ----------
  function makeEmployee(name, role, fixedRestDays, pairWith){
    return {
      id: uid(), name: name||'', status: {}, hireDate:'', endDate:'',
      role: role||'operatore',
      fixedRestDays: fixedRestDays||[],
      pairWith: pairWith||null
    };
  }

  let state = {
    departments:[{
      id: uid(),
      name: 'Personale',
      maxRestPerDay: 12,
      saturdayMaxRest: 11,
      restDaysPerWeek: 2,
      avoidMonday: false,
      saturdayOverflow: true,
      employees:[
        makeEmployee('Responsabile 1','responsabile'),
        makeEmployee('Responsabile 2','responsabile'),
        makeEmployee('Vice Responsabile 1','vice'),
        makeEmployee('Vice Responsabile 2','vice'),
        makeEmployee('Pasticcere 1','pasticcere'),
        makeEmployee('Pasticcere 2','pasticcere'),
        makeEmployee('Pasticcere 3','pasticcere'),
        makeEmployee('Forni 1','forni'),
        makeEmployee('Forni 2','forni'),
        makeEmployee('Forni Bis 1','forni_bis'),
        makeEmployee('Forni Bis 2','forni_bis'),
        makeEmployee('Consegne Pom. 1','consegne_pomeriggio'),
        makeEmployee('Consegne Pom. 2','consegne_pomeriggio'),
        ...Array.from({length:28},(_,i)=>makeEmployee('Operatore '+(i+1),'operatore'))
      ]
    }]
  };

  let periodStart = new Date(2026,5,29);
  let periodEnd   = new Date(2026,7,2);

  // ---------- Period dates ----------
  function getPeriodDates(){
    const dates=[],cur=new Date(periodStart);
    cur.setHours(0,0,0,0);
    const e=new Date(periodEnd); e.setHours(0,0,0,0);
    while(cur<=e){ dates.push(dateToStr(cur)); cur.setDate(cur.getDate()+1); }
    return dates;
  }

  // ---------- Employee helpers ----------
  function isEmployeeActive(emp,dateStr){
    if(emp.hireDate && dateStr<emp.hireDate) return false;
    if(emp.endDate && dateStr>emp.endDate) return false;
    return true;
  }
  function cycleStatus(deptId,empId,dateStr){
    const dept=state.departments.find(d=>d.id===deptId);
    if(!dept) return;
    const emp=dept.employees.find(e=>e.id===empId);
    if(!emp||!isEmployeeActive(emp,dateStr)) return undefined;
    const cur=emp.status[dateStr]||'';
    if(cur==='') emp.status[dateStr]='riposo';
    else if(cur==='riposo') emp.status[dateStr]='ferie';
    else delete emp.status[dateStr];
    notifyChange();
    return emp.status[dateStr]||'';
  }

  // ---------- Setters ----------
  function renameEmployee(deptId,empId,value){ const d=state.departments.find(x=>x.id===deptId); if(!d)return; const e=d.employees.find(x=>x.id===empId); if(e){e.name=value;notifyChange();} }
  function setEmployeeRole(deptId,empId,value){ const d=state.departments.find(x=>x.id===deptId); if(!d)return; const e=d.employees.find(x=>x.id===empId); if(e){e.role=value||'operatore';notifyChange();} }
  function setEmployeeHireDate(deptId,empId,value){ const d=state.departments.find(x=>x.id===deptId); if(!d)return; const e=d.employees.find(x=>x.id===empId); if(e){e.hireDate=value||'';notifyChange();} }
  function setEmployeeEndDate(deptId,empId,value){ const d=state.departments.find(x=>x.id===deptId); if(!d)return; const e=d.employees.find(x=>x.id===empId); if(e){e.endDate=value||'';notifyChange();} }
  function setMaxRestPerDay(deptId,value){ const d=state.departments.find(x=>x.id===deptId); if(!d)return; const n=parseInt(value,10); d.maxRestPerDay=(isNaN(n)||n<0)?0:n; }
  function setSaturdayMaxRest(deptId,value){ const d=state.departments.find(x=>x.id===deptId); if(!d)return; const n=parseInt(value,10); d.saturdayMaxRest=(isNaN(n)||n<0)?0:n; }
  function setRestDaysPerWeek(deptId,value){ const d=state.departments.find(x=>x.id===deptId); if(!d)return; const n=parseInt(value,10); d.restDaysPerWeek=(isNaN(n)||n<1)?1:Math.min(n,7); }
  function setAvoidMonday(deptId,value){ const d=state.departments.find(x=>x.id===deptId); if(!d)return; d.avoidMonday=!!value; }
  function setSaturdayOverflow(deptId,value){ const d=state.departments.find(x=>x.id===deptId); if(!d)return; d.saturdayOverflow=!!value; }
  function addEmployee(deptId){ const d=state.departments.find(x=>x.id===deptId); if(d){ d.employees.push(makeEmployee('','operatore')); render(); } }
  function removeEmployee(deptId,empId){ const d=state.departments.find(x=>x.id===deptId); if(!d)return; d.employees=d.employees.filter(e=>e.id!==empId); render(); notifyChange(); }
  function addDepartment(){ state.departments.push({id:uid(),name:'Nuovo reparto',maxRestPerDay:1,saturdayMaxRest:1,restDaysPerWeek:2,avoidMonday:true,saturdayOverflow:false,employees:[makeEmployee('','operatore')]}); render(); }
  function removeDepartment(deptId){ state.departments=state.departments.filter(d=>d.id!==deptId); render(); notifyChange(); }
  function renameDepartment(deptId,value){ const d=state.departments.find(x=>x.id===deptId); if(d){d.name=value;notifyChange();} }

  // ---------- Generate Rest Days ----------
  function generateRestDays(deptId){
    const dept=state.departments.find(d=>d.id===deptId);
    if(!dept) return null;
    if(typeof dept.maxRestPerDay!=='number') dept.maxRestPerDay=1;
    if(typeof dept.saturdayMaxRest!=='number') dept.saturdayMaxRest=dept.maxRestPerDay;
    if(typeof dept.restDaysPerWeek!=='number') dept.restDaysPerWeek=2;
    if(typeof dept.avoidMonday!=='boolean') dept.avoidMonday=true;
    if(typeof dept.saturdayOverflow!=='boolean') dept.saturdayOverflow=false;

    const dates=getPeriodDates();
    if(dates.length===0) return {critical:[],roleGaps:[],totalEmployees:dept.employees.length};

    // Settimane Lun-Dom
    const weeks=[]; let cw=[];
    dates.forEach(ds=>{
      const dow=parseDateStr(ds).getDay();
      const mi=(dow===0)?6:dow-1;
      if(cw.length>0&&mi===0){weeks.push(cw);cw=[];}
      cw.push(ds);
    });
    if(cw.length>0) weeks.push(cw);

    // Pulizia riposi (non ferie)
    dept.employees.forEach(emp=>{
      Object.keys(emp.status).forEach(ds=>{ if(emp.status[ds]==='riposo') delete emp.status[ds]; });
    });

    const issues=[];
    const restPerWeek=dept.restDaysPerWeek;

    function countsOnDay(emp,ds){ return isEmployeeActive(emp,ds)&&emp.status[ds]!=='ferie'; }
    function adjDate(ds,delta){ const d=parseDateStr(ds); d.setDate(d.getDate()+delta); return dateToStr(d); }
    function isMonday(ds){ return parseDateStr(ds).getDay()===1; }
    function isSaturday(ds){ return parseDateStr(ds).getDay()===6; }
    function isWeekendDay(ds){ const w=parseDateStr(ds).getDay(); return w===0||w===6; }
    function dayCap(ds){ return isSaturday(ds)?dept.saturdayMaxRest:dept.maxRestPerDay; }

    // PRE-ASSEGNAZIONE giorni fissi
    dept.employees.forEach(emp=>{
      if(!emp.fixedRestDays||emp.fixedRestDays.length===0) return;
      dates.forEach(ds=>{
        const dow=parseDateStr(ds).getDay();
        if(emp.fixedRestDays.includes(dow)&&isEmployeeActive(emp,ds)&&emp.status[ds]!=='ferie'){
          emp.status[ds]='riposo';
        }
      });
    });

    // Chi ha già abbastanza giorni fissi viene saltato nel ciclo automatico
    const skipInAutoGen=new Set(
      dept.employees.filter(emp=>emp.fixedRestDays&&emp.fixedRestDays.length>=restPerWeek).map(emp=>emp.id)
    );

    // CRITICAL ROLES
    const CRITICAL_ROLES=['responsabile','vice','pasticcere','consegne_pomeriggio','forni','forni_bis'];

    // Rotazione weekend
    const weekendRestCount={};
    dept.employees.forEach(emp=>{ weekendRestCount[emp.id]=0; });

    function assignOneRest(emp,candidates,restCount,weekIndex,empIdx,lastRest,roleBlockedDays,softAvoidDays,totalEligible,empRotIdx,weekSat,roundIdx){
      if(candidates.length===0) return null;
      const _soft=softAvoidDays||new Set();

      const preferredDays=candidates.filter(d=>!isSaturday(d));
      const satCandidate=candidates.find(d=>isSaturday(d))||null;
      const roleOkPref=preferredDays.filter(d=>!roleBlockedDays.has(d));
      const roleWasForced=roleOkPref.length===0&&preferredDays.length>0;
      const basePref=roleOkPref.length>0?roleOkPref:preferredDays;
      const nonAdj=basePref.filter(d=>{
        if(!lastRest) return true;
        return d!==adjDate(lastRest,1)&&d!==adjDate(lastRest,-1)&&d!==lastRest;
      });

      function pickBest(pool){
        if(pool.length===0) return null;
        const n=pool.length, so=(weekIndex*3+empIdx)%n;
        const rot=[];
        for(let i=0;i<n;i++) rot.push(pool[(empIdx+so+i)%n]);
        function valid(skipMon){ return rot.filter(d=>restCount[d]<dayCap(d)&&!(skipMon&&dept.avoidMonday&&isMonday(d))); }
        let c2=valid(true); if(c2.length===0) c2=valid(false); if(c2.length===0) return null;
        const pref=c2.filter(d=>!_soft.has(d));
        const working=pref.length>0?pref:c2;
        const safe=Math.max(1,Math.min(dept.maxRestPerDay,totalEligible||1));
        const slot=(empRotIdx+weekIndex)%(totalEligible||1);
        const wkTurn=slot<safe;
        if(wkTurn){ const wp=working.find(d=>isWeekendDay(d)); if(wp) return wp; }
        else{ const nwp=working.find(d=>!isWeekendDay(d)); if(nwp) return nwp; }
        return working[0];
      }

      let chosen=pickBest(nonAdj);
      if(!chosen) chosen=pickBest(basePref);

      let usedSat=false;
      if(!chosen&&satCandidate&&countsOnDay(emp,satCandidate)&&restCount[satCandidate]<dayCap(satCandidate)){
        chosen=satCandidate; usedSat=true;
      }
      if(!chosen&&satCandidate&&countsOnDay(emp,satCandidate)){
        chosen=satCandidate; usedSat=true;
      }
      if(!chosen){
        const fb=nonAdj.length>0?nonAdj:(basePref.length>0?basePref:(preferredDays.length>0?preferredDays:(satCandidate?[satCandidate]:[])));
        if(fb.length>0){
          let best=fb[0],br=dayCap(best)-restCount[best];
          fb.forEach(d=>{ const r=dayCap(d)-restCount[d]; if(r>br){best=d;br=r;} });
          chosen=best;
          issues.push({week:weekIndex+1,date:chosen,reason:'max-riposi-superato'});
        }
      }
      if(chosen&&roleWasForced&&!usedSat) issues.push({week:weekIndex+1,date:chosen,reason:'copertura-ruolo-non-garantita'});
      return chosen;
    }

    const lastRestDate={};

    weeks.forEach((weekDates,weekIndex)=>{
      const eligible=dept.employees.filter(emp=>weekDates.some(d=>countsOnDay(emp,d)));
      if(eligible.length===0) return;

      const weekSat=weekDates.find(d=>isSaturday(d))||null;

      // restCount inizializzato tenendo conto dei riposi fissi già pre-assegnati
      const restCount={};
      weekDates.forEach(d=>restCount[d]=0);
      dept.employees.forEach(emp=>{
        weekDates.forEach(d=>{ if(emp.status[d]==='riposo') restCount[d]++; });
      });

      const roleAvailable={};
      CRITICAL_ROLES.forEach(role=>{
        roleAvailable[role]={};
        weekDates.forEach(d=>{
          roleAvailable[role][d]=dept.employees.filter(e=>e.role===role&&countsOnDay(e,d)).length;
        });
      });

      const ROLE_ORDER=['responsabile','vice','pasticcere','forni','forni_bis','consegne_pomeriggio'];
      const ordered=[
        ...ROLE_ORDER.flatMap(role=>eligible.filter(e=>e.role===role&&!skipInAutoGen.has(e.id))),
        ...eligible.filter(e=>!ROLE_ORDER.includes(e.role)&&!skipInAutoGen.has(e.id))
      ];

      const assignedMap={};
      ordered.forEach(emp=>{ assignedMap[emp.id]=[]; });

      for(let round=0;round<restPerWeek;round++){
        ordered.forEach((emp,empIdx)=>{
          const baseCand=weekDates.filter(d=>countsOnDay(emp,d));
          const assigned=assignedMap[emp.id];
          const roleBlocked=new Set();
          const softAvoid=new Set();

          if(CRITICAL_ROLES.includes(emp.role)){
            weekDates.forEach(d=>{ if(roleAvailable[emp.role][d]<=1) roleBlocked.add(d); });
          }
          if(emp.role==='responsabile'||emp.role==='vice'){
            // Rigido: mai di lunedì
            weekDates.forEach(d=>{ if(isMonday(d)) roleBlocked.add(d); });
            // Morbido: evita giorni in cui il ruolo gemello è già a riposo
            const gem=emp.role==='responsabile'?'vice':'responsabile';
            const gemTot=dept.employees.filter(e=>e.role===gem).length;
            weekDates.forEach(d=>{ if(roleAvailable[gem]&&roleAvailable[gem][d]<gemTot) softAvoid.add(d); });
          }
          if(emp.role==='pasticcere'){
            const ptot=dept.employees.filter(e=>e.role==='pasticcere').length;
            weekDates.forEach(d=>{ if(roleAvailable['pasticcere']&&roleAvailable['pasticcere'][d]<ptot) softAvoid.add(d); });
          }
          // Coppia: non riposare stesso giorno del partner
          if(emp.pairWith){
            const partner=dept.employees.find(e=>e.name===emp.pairWith);
            if(partner) weekDates.forEach(d=>{ if(partner.status[d]==='riposo') roleBlocked.add(d); });
          }

          const remaining=baseCand.filter(d=>!assigned.includes(d));
          if(remaining.length===0) return;

          const chosen=assignOneRest(emp,remaining,restCount,weekIndex,empIdx+round*100,lastRestDate[emp.id],roleBlocked,softAvoid,ordered.length,empIdx,weekSat,round);
          if(!chosen) return;

          emp.status[chosen]='riposo';
          restCount[chosen]++;
          lastRestDate[emp.id]=chosen;
          assigned.push(chosen);
          if(isWeekendDay(chosen)) weekendRestCount[emp.id]++;
          if(CRITICAL_ROLES.includes(emp.role)) roleAvailable[emp.role][chosen]--;
        });
      }
    });

    return buildCoverageReport(dept,weeks,issues);
  }

  // ---------- Coverage Report ----------
  function buildCoverageReport(dept,weeks,issues){
    const dates=getPeriodDates();
    const CRITICAL_ROLES=['responsabile','vice','pasticcere','consegne_pomeriggio','forni','forni_bis'];

    const critical=[];
    dates.forEach(ds=>{
      const isSat=parseDateStr(ds).getDay()===6;
      const cap=isSat?(dept.saturdayMaxRest!==undefined?dept.saturdayMaxRest:dept.maxRestPerDay):dept.maxRestPerDay;
      const rc=dept.employees.filter(emp=>isEmployeeActive(emp,ds)&&emp.status[ds]==='riposo').length;
      if(rc>cap) critical.push({date:ds,present:rc,required:cap});
    });

    const roleGaps=[];
    CRITICAL_ROLES.forEach(role=>{
      const hasRole=dept.employees.some(emp=>emp.role===role);
      if(!hasRole) return;
      dates.forEach(ds=>{
        const cnt=dept.employees.filter(emp=>emp.role===role&&isEmployeeActive(emp,ds)&&emp.status[ds]!=='riposo'&&emp.status[ds]!=='ferie').length;
        if(cnt<1) roleGaps.push({date:ds,role,present:cnt,required:1});
      });
    });

    return {critical,roleGaps,totalEmployees:dept.employees.length};
  }

  // ---------- Render Coverage ----------
  function renderCoverageReport(block,report){
    const el=block.querySelector('[data-report]');
    if(!el) return;
    if(!report){el.innerHTML='';return;}
    const ROLE_LABEL={responsabile:'Responsabile',vice:'Vice responsabile',pasticcere:'Pasticcere',consegne_pomeriggio:'Consegne Pomeriggio',forni:'Forni',forni_bis:'Forni Bis'};
    let html='';
    if(report.critical.length===0){
      html+=`<span class="ok-msg">✓ Massimo riposi/giorno rispettato per tutti i giorni del periodo.</span>`;
    }else{
      html+=`<span class="warn-msg">⚠ Limite massimo riposi superato in ${report.critical.length} giorno/i:</span><ul>`;
      report.critical.forEach(c=>{ html+=`<li>${formatDateShort(c.date)}: ${c.present} riposi su massimo ${c.required} consentiti</li>`; });
      html+=`</ul>`;
    }
    const rg=report.roleGaps||[];
    if(rg.length>0){
      html+=`<div style="margin-top:8px"><span class="warn-msg">⚠ Copertura ruoli mancante in ${rg.length} caso/i:</span><ul>`;
      rg.forEach(g=>{ html+=`<li>${formatDateShort(g.date)}: ${ROLE_LABEL[g.role]||g.role} — ${g.present!==undefined?g.present+' presenti (min '+g.required+' richiesti)':'nessuno presente'}</li>`; });
      html+=`</ul><span style="color:var(--muted)">Verifica manualmente i riposi/ferie di quel giorno per quel ruolo.</span></div>`;
    }else if(report.critical.length===0){
      html+=`<div style="margin-top:4px"><span class="ok-msg">✓ Copertura ruoli garantita ogni giorno.</span></div>`;
    }
    el.innerHTML=html;
  }

  // ---------- Render Dept ----------
  const DAY_NAMES=['DOM','LUN','MAR','MER','GIO','VEN','SAB'];

  function renderDept(dept,dates){
    if(typeof dept.maxRestPerDay!=='number') dept.maxRestPerDay=1;
    if(typeof dept.saturdayMaxRest!=='number') dept.saturdayMaxRest=dept.maxRestPerDay;
    if(typeof dept.avoidMonday!=='boolean') dept.avoidMonday=true;
    if(typeof dept.saturdayOverflow!=='boolean') dept.saturdayOverflow=false;

    let html=`<div class="dept-block" data-dept="${dept.id}">`;
    html+=`<div class="dept-header">`;
    html+=`<input type="text" class="dept-name" value="${escapeHtml(dept.name)}" maxlength="40">`;
    html+=`<button class="add-emp-btn">+ Dipendente</button>`;
    html+=`<button class="del-dept">Elimina reparto</button>`;
    html+=`</div>`;

    html+=`<div class="dept-settings">`;
    html+=`<label>Max riposi/gg (lun-ven+dom): <input type="number" class="max-rest" min="0" max="${dept.employees.length}" value="${dept.maxRestPerDay}"></label>`;
    html+=`<label>Max riposi sabato: <input type="number" class="saturday-max-rest" min="0" max="${dept.employees.length}" value="${dept.saturdayMaxRest}"></label>`;
    html+=`<label>Riposi/settimana: <input type="number" class="rest-per-week" min="1" max="7" value="${dept.restDaysPerWeek||2}"></label>`;
    html+=`<label class="checkbox-label"><input type="checkbox" class="avoid-monday" ${dept.avoidMonday?'checked':''}> Evita lunedì</label>`;
    html+=`<label class="checkbox-label"><input type="checkbox" class="saturday-overflow" ${dept.saturdayOverflow?'checked':''}> Sabato ultima priorità</label>`;
    html+=`<span class="mode-hint">${dept.restDaysPerWeek||2} riposi/sett · no riposi consecutivi · ferie escluse${dept.saturdayOverflow?' · sabato riempito per ultimo':''}</span>`;
    html+=`<button class="generate">Genera riposi del periodo</button>`;
    html+=`</div>`;

    html+=`<div class="coverage-report" data-report></div>`;

    // Tabella
    html+=`<div class="grid-wrap"><table class="roster">`;
    html+=`<thead><tr><th class="name-cell" style="position:sticky;left:0;z-index:3;background:var(--paper)">Dipendente / Contratto</th>`;
    dates.forEach(ds=>{
      const d=parseDateStr(ds);
      const dow=d.getDay();
      const isWe=(dow===0||dow===6);
      html+=`<th class="${isWe?'weekend':''} daynum dow-${dow}">${d.getDate()}<br>${DAY_NAMES[dow]}</th>`;
    });
    html+=`</tr></thead><tbody>`;

    // Ordinamento dipendenti
    const DISPLAY_ORDER=['responsabile','vice','pasticcere','forni','forni_bis','consegne_pomeriggio'];
    const sorted=[
      ...DISPLAY_ORDER.flatMap(role=>dept.employees.filter(e=>e.role===role)),
      ...dept.employees.filter(e=>!DISPLAY_ORDER.includes(e.role))
    ];

    sorted.forEach(emp=>{
      html+=`<tr data-emp="${emp.id}" data-role="${emp.role||'operatore'}">`;
      html+=`<td class="name-cell">`;
      html+=`<input type="text" class="emp-name" value="${escapeHtml(emp.name)}" placeholder="Nome dipendente" maxlength="30">`;
      html+=`<div class="emp-dates">`;
      html+=`<select class="emp-role">`;
      ['operatore','responsabile','vice','pasticcere','consegne_pomeriggio','forni','forni_bis'].forEach(r=>{
        const labels={operatore:'Operatore',responsabile:'Responsabile',vice:'Vice responsabile',pasticcere:'Pasticcere',consegne_pomeriggio:'Consegne Pom.',forni:'Forni',forni_bis:'Forni Bis'};
        html+=`<option value="${r}" ${emp.role===r?'selected':''}>${labels[r]}</option>`;
      });
      html+=`</select></div>`;
      html+=`<div class="emp-dates">`;
      html+=`<label>Da <input type="date" class="emp-hire" value="${emp.hireDate||''}"></label>`;
      html+=`<label>A <input type="date" class="emp-end" value="${emp.endDate||''}"></label>`;
      html+=`</div>`;
      // Giorni fissi
      html+=`<div class="emp-dates">`;
      html+=`<span style="font-size:9px;color:var(--muted)">Riposi fissi:</span>`;
      [1,2,3,4,5,6,0].forEach(dow=>{
        const dn=['Dom','Lun','Mar','Mer','Gio','Ven','Sab'];
        const checked=(emp.fixedRestDays||[]).includes(dow)?'checked':'';
        html+=`<label style="font-size:9px;margin-left:3px"><input type="checkbox" class="fixed-rest-day" data-dow="${dow}" ${checked}>${dn[dow]}</label>`;
      });
      html+=`</div>`;
      // Coppia
      html+=`<div class="emp-dates">`;
      html+=`<label style="font-size:9px;color:var(--muted)">Mai assente con: <input type="text" class="emp-pair" style="font-size:9px;width:80px;padding:1px 3px" value="${escapeHtml(emp.pairWith||'')}" placeholder="Nome collega"></label>`;
      html+=`</div>`;
      html+=`<button class="del-row" title="Rimuovi">×</button>`;
      html+=`</td>`;

      dates.forEach(ds=>{
        const d=parseDateStr(ds);
        const dow=d.getDay();
        const isWe=(dow===0||dow===6);
        const active=isEmployeeActive(emp,ds);
        if(!active){
          html+=`<td class="daycell inactive ${isWe?'weekend':''} dow-${dow}" data-date="${ds}"></td>`;
        }else{
          const st=emp.status[ds]||'';
          html+=`<td class="daycell ${st} ${isWe?'weekend':''} dow-${dow}" data-date="${ds}"></td>`;
        }
      });
      html+=`</tr>`;
    });
    html+=`</tbody></table></div>`;
    html+=`</div>`;
    return html;
  }

  function renderForDept(block,dept){
    const dates=getPeriodDates();
    block.outerHTML=renderDept(dept,dates);
    const newBlock=document.querySelector(`[data-dept="${dept.id}"]`);
    attachListeners(newBlock,dept);
    const report=buildCoverageReport(dept,null,[]);
    renderCoverageReport(newBlock,report);
  }

  function render(){
    const dates=getPeriodDates();
    document.getElementById('daysCount').textContent=`${dates.length} giorni · ~${Math.round(dates.length/7)} settimane`;
    const container=document.getElementById('deptContainer');
    container.innerHTML=state.departments.map(dept=>renderDept(dept,dates)).join('');
    state.departments.forEach(dept=>{
      const block=container.querySelector(`[data-dept="${dept.id}"]`);
      attachListeners(block,dept);
      const report=buildCoverageReport(dept,null,[]);
      renderCoverageReport(block,report);
    });
  }

  function attachListeners(block,dept){
    const deptId=dept.id;

    block.querySelector('.dept-name').addEventListener('change',e=>{ renameDepartment(deptId,e.target.value); });
    block.querySelector('.add-emp-btn').addEventListener('click',()=>{ addEmployee(deptId); });
    block.querySelector('.del-dept').addEventListener('click',()=>{ if(confirm('Eliminare il reparto?')) removeDepartment(deptId); });
    block.querySelector('.max-rest').addEventListener('change',e=>{ setMaxRestPerDay(deptId,e.target.value); renderForDept(block,dept); });
    block.querySelector('.saturday-max-rest').addEventListener('change',e=>{ setSaturdayMaxRest(deptId,e.target.value); renderForDept(block,dept); });
    block.querySelector('.rest-per-week').addEventListener('change',e=>{ setRestDaysPerWeek(deptId,e.target.value); renderForDept(block,dept); });
    block.querySelector('.avoid-monday').addEventListener('change',e=>{ setAvoidMonday(deptId,e.target.checked); });
    block.querySelector('.saturday-overflow').addEventListener('change',e=>{ setSaturdayOverflow(deptId,e.target.checked); renderForDept(block,dept); });
    block.querySelector('.generate').addEventListener('click',()=>{
      const report=generateRestDays(deptId);
      renderForDept(block,dept);
    });

    block.querySelectorAll('tr[data-emp]').forEach(row=>{
      const empId=row.dataset.emp;
      row.querySelector('.emp-name').addEventListener('change',e=>{ renameEmployee(deptId,empId,e.target.value); });
      row.querySelector('.emp-role').addEventListener('change',e=>{ setEmployeeRole(deptId,empId,e.target.value); row.dataset.role=e.target.value; });
      row.querySelector('.emp-hire').addEventListener('change',e=>{ setEmployeeHireDate(deptId,empId,e.target.value); renderForDept(block,dept); });
      row.querySelector('.emp-end').addEventListener('change',e=>{ setEmployeeEndDate(deptId,empId,e.target.value); renderForDept(block,dept); });
      row.querySelectorAll('.fixed-rest-day').forEach(cb=>{
        cb.addEventListener('change',()=>{
          const d=state.departments.find(x=>x.id===deptId);
          const emp=d&&d.employees.find(e=>e.id===empId);
          if(!emp) return;
          const checked=[];
          row.querySelectorAll('.fixed-rest-day').forEach(c=>{ if(c.checked) checked.push(parseInt(c.dataset.dow)); });
          emp.fixedRestDays=checked;
          notifyChange();
        });
      });
      row.querySelector('.emp-pair').addEventListener('change',e=>{
        const d=state.departments.find(x=>x.id===deptId);
        const emp=d&&d.employees.find(e=>e.id===empId);
        if(emp){ emp.pairWith=e.target.value.trim()||null; notifyChange(); }
      });
      row.querySelector('.del-row').addEventListener('click',()=>{ removeEmployee(deptId,empId); });
      row.querySelectorAll('td.daycell').forEach(cell=>{
        if(cell.classList.contains('inactive')) return;
        cell.addEventListener('click',()=>{
          const next=cycleStatus(deptId,empId,cell.dataset.date);
          if(next===undefined) return;
          cell.classList.remove('riposo','ferie');
          if(next) cell.classList.add(next);
          const report=buildCoverageReport(dept,null,[]);
          renderCoverageReport(block,report);
          notifyChange();
        });
      });
    });
  }

  // ---------- Events ----------
  const periodStartInput=document.getElementById('periodStart');
  const periodEndInput=document.getElementById('periodEnd');
  periodStartInput.value=dateToStr(periodStart);
  periodEndInput.value=dateToStr(periodEnd);
  periodStartInput.addEventListener('change',e=>{ if(!e.target.value)return; periodStart=parseDateStr(e.target.value); render(); });
  periodEndInput.addEventListener('change',e=>{ if(!e.target.value)return; periodEnd=parseDateStr(e.target.value); render(); });

  document.getElementById('addDeptBtn').addEventListener('click',addDepartment);

  document.getElementById('shareBtn').addEventListener('click',()=>{
    navigator.clipboard.writeText(window.location.href).then(()=>alert('Link copiato negli appunti!')).catch(()=>prompt('Copia questo link:',window.location.href));
  });

  document.getElementById('exportPdfBtn').addEventListener('click',()=>{
    const s=document.createElement('style');
    s.id='__print_override__';
    s.textContent='@page{size:A3 landscape;margin:6mm 4mm;}';
    document.head.appendChild(s);
    window.print();
    setTimeout(()=>{ const x=document.getElementById('__print_override__'); if(x)x.remove(); },1000);
  });

  document.getElementById('exportJsonBtn').addEventListener('click',()=>{
    const blob=new Blob([JSON.stringify({state,periodStart:dateToStr(periodStart),periodEnd:dateToStr(periodEnd)},null,2)],{type:'application/json'});
    const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='turni.json'; a.click();
  });

  document.getElementById('importJsonInput').addEventListener('change',e=>{
    const file=e.target.files[0]; if(!file)return;
    const reader=new FileReader();
    reader.onload=ev=>{
      try{
        const data=JSON.parse(ev.target.result);
        if(data.state) state=normalizeState(data.state);
        else if(data.departments) state=normalizeState(data);
        if(data.periodStart) periodStart=parseDateStr(data.periodStart);
        if(data.periodEnd) periodEnd=parseDateStr(data.periodEnd);
        periodStartInput.value=dateToStr(periodStart);
        periodEndInput.value=dateToStr(periodEnd);
        render();
      }catch(err){ alert('Errore nel file JSON: '+err.message); }
    };
    reader.readAsText(file);
    e.target.value='';
  });

  function normalizeState(s){
    s.departments.forEach(dept=>{
      if(typeof dept.maxRestPerDay!=='number') dept.maxRestPerDay=1;
      if(typeof dept.saturdayMaxRest!=='number') dept.saturdayMaxRest=dept.maxRestPerDay;
      if(typeof dept.restDaysPerWeek!=='number') dept.restDaysPerWeek=2;
      if(typeof dept.avoidMonday!=='boolean') dept.avoidMonday=true;
      if(typeof dept.saturdayOverflow!=='boolean') dept.saturdayOverflow=false;
      delete dept.minCoverage;
      (dept.employees||[]).forEach(emp=>{
        if(!emp.status) emp.status={};
        if(emp.hireDate===undefined) emp.hireDate='';
        if(emp.endDate===undefined) emp.endDate='';
        if(emp.role===undefined) emp.role='operatore';
        if(emp.fixedRestDays===undefined) emp.fixedRestDays=[];
        if(emp.pairWith===undefined) emp.pairWith=null;
      });
    });
    return s;
  }

  let notifyChange=function(){};

  // ---------- Firebase sync ----------
  const DB_PATH='turni/v1';
  let db=null,isRemoteUpdate=false;
  const syncEl=document.getElementById('syncStatus');

  function loadFirebase(){
    try{
      const fbApp=firebase.app();
      db=firebase.database(fbApp);
      const ref=db.ref(DB_PATH);
      ref.once('value',snap=>{
        const val=snap.val();
        if(val&&val.state){
          state=normalizeState(val.state);
          if(val.periodStart) periodStart=parseDateStr(val.periodStart);
          if(val.periodEnd) periodEnd=parseDateStr(val.periodEnd);
          periodStartInput.value=dateToStr(periodStart);
          periodEndInput.value=dateToStr(periodEnd);
          render();
          syncEl.textContent='● Sincronizzato ✓';
        } else {
          pushToFirebase();
        }
      });
      ref.on('value',snap=>{
        if(isRemoteUpdate) return;
        const val=snap.val();
        if(val&&val.state){
          isRemoteUpdate=true;
          state=normalizeState(val.state);
          if(val.periodStart) periodStart=parseDateStr(val.periodStart);
          if(val.periodEnd) periodEnd=parseDateStr(val.periodEnd);
          periodStartInput.value=dateToStr(periodStart);
          periodEndInput.value=dateToStr(periodEnd);
          render();
          syncEl.textContent='● Sincronizzato ✓';
          setTimeout(()=>{ isRemoteUpdate=false; },200);
        }
      });
      notifyChange=debounce(pushToFirebase,800);
    }catch(e){ syncEl.textContent=''; }
  }

  function pushToFirebase(){
    if(!db) return;
    db.ref(DB_PATH).set({state,periodStart:dateToStr(periodStart),periodEnd:dateToStr(periodEnd)})
      .then(()=>{ syncEl.textContent='● Sincronizzato ✓'; })
      .catch(()=>{ syncEl.textContent='⚠ Errore sync'; });
  }

  function debounce(fn,ms){ let t; return function(){clearTimeout(t);t=setTimeout(fn,ms);}; }

  render();
  if(typeof firebase!=='undefined') loadFirebase();
</script>
